<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>İyi Geceler Sevde</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      position: relative;
      height: 100vh;
      background-image: url('https://github.com/delaisse404/darkesthour/raw/main/ezgif.com-effects (1).gif'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .lyrics {
      position: absolute;
      top: 30%;
      width: 100%;
      text-align: center;
      font-size: 2.3em;
      font-style: italic;
      font-weight: bold;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
      z-index: 2;
      padding: 0 10px;
      box-sizing: border-box;
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
    }

    .lyrics.visible {
      opacity: 1;
    }

    .controls {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      align-items: center;
      z-index: 3;
    }

    .controls button {
      padding: 14px 24px;
      font-size: 1.2em;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    @media (max-width: 600px) {
      .lyrics {
        font-size: 1.6em;
        top: 15%;
      }
      .controls {
        top: 75%;
      }
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>

  <audio id="audio">
    <source src="My Dreams - Black Sea Dahu.mp3" type="audio/mp3">
    Tarayıcınız audio elementini desteklemiyor.
  </audio>

  <div class="controls">
    <button id="playButton">🐱 Dinle 🐱</button>
    <button id="pauseButton" style="display: none;"> ⏸ </button>
  </div>

  <div class="lyrics" id="lyrics">Sözler burada çıkacak...</div>

<script>
// Verdiğin saniyelere göre güncellenmiş liste
const lyrics = [
  { time: 0.0, text: "♪" },
  { time: 39.0, text: "Dolabımı yapraklarla dolduruyorum" },
  { time: 46.0, text: "Donup kaldım öylece" },
  { time: 50.0, text: "Tüm hazinemi saklıyorum" },
  { time: 52.0, text: "♪" },
  { time: 54.0, text: "Beni odanın bir ucundan diğerine dans ettir sevgilim" },
  { time: 59.0, text: "Kollarında salla beni" },
  { time: 69.0, text: "Uykuyu cezbetmek için kedi otu kökü..." }
];

    const audio = document.getElementById('audio');
    const lyricsContainer = document.getElementById('lyrics');
    const playButton = document.getElementById('playButton');
    const pauseButton = document.getElementById('pauseButton');

    let lyricInterval;

    function updateLyrics() {
      const currentTime = audio.currentTime;
      let activeText = "";

      for (let i = 0; i < lyrics.length; i++) {
        if (currentTime >= lyrics[i].time) {
          activeText = lyrics[i].text;
        } else {
          break;
        }
      }

      if (lyricsContainer.textContent !== activeText) {
        lyricsContainer.textContent = activeText;
        lyricsContainer.classList.remove('visible');
        void lyricsContainer.offsetWidth; 
        lyricsContainer.classList.add('visible');
      }
    }

    playButton.addEventListener('click', () => {
      audio.play();
      playButton.style.display = 'none';
      pauseButton.style.display = 'inline-block';
      lyricInterval = setInterval(updateLyrics, 100);
    });

    pauseButton.addEventListener('click', () => {
      audio.pause();
      pauseButton.style.display = 'none';
      playButton.style.display = 'inline-block';
      clearInterval(lyricInterval);
    });

    audio.addEventListener('ended', () => {
      playButton.style.display = 'inline-block';
      pauseButton.style.display = 'none';
      clearInterval(lyricInterval);
      lyricsContainer.textContent = "♪";
    });
  </script>

</body>
</html>
