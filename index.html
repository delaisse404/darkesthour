<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>İyi Geceler Sevde</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
      position: relative;
      height: 100vh;
      background-image: url('https://github.com/delaisse404/darkesthour/raw/main/ezgif.com-effects (1).gif'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .lyrics {
      position: absolute;
      top: 30%;
      width: 100%;
      text-align: center;
      font-size: 2.3em;
      font-style: italic;
      font-weight: bold;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
      z-index: 2;
      padding: 0 10px;
      box-sizing: border-box;
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
    }

    .lyrics.visible {
      opacity: 1;
    }

    .controls {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      align-items: center;
      z-index: 3;
    }

    .controls button {
      padding: 14px 24px;
      font-size: 1.2em;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    @media (max-width: 600px) {
      .lyrics {
        font-size: 1.6em;
        top: 15%;
      }
      .controls {
        top: 75%;
      }
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>

  <audio id="audio">
    <source src="My Dreams - Black Sea Dahu.mp3" type="audio/mp3">
    Tarayıcınız audio elementini desteklemiyor.
  </audio>

  <div class="controls">
    <button id="playButton">🐱 Dinle 🐱</button>
    <button id="pauseButton" style="display: none;"> ⏸ </button>
  </div>

  <div class="lyrics" id="lyrics">♪</div>

<script>
const lyrics = [

  { time: 10.0, text: "İyi ki doğdun Sevde" }, 
  { time: 20.0, text: "♪" }, // Şarkı başlayana kadar sessizlik simgesi
  { time: 39.0, text: "Dolabımı yapraklarla dolduruyorum," },
  { time: 46.5, text: "Donup kaldım öylece," },
  { time: 50.0, text: "Tüm hazinemi saklıyorum." },
  { time: 52.0, text: "♪" },
  { time: 54.0, text: "Beni odanın bir ucundan diğerine dans ettir sevgilim," },
  { time: 59.0, text: "Kollarında salla beni." },
  { time: 69.0, text: "Uykuyu cezbetmek için kedi otu kökü..." },
  { time: 76.0, text: "Uyku parça parça gelir, sonra öyle derine dalar ki;" },
  { time: 80.0, text: "Düşlerim.." },
  { time: 81.5, text: "Düşlerimde kolum kemiğine kadar kesilmişti," },
  { time: 84.8, text: "Fırlatılan bir bıçak ve biri yerde.." },
  { time: 87.0, text: "Neredeyse uyanamıyordum." },
  { time: 91.3, text: "Aslanpençesi," },
  { time: 94.9, text: "Felsefe taşı," },
  { time: 99.0, text: "Bir kavanozda kurutulmuş ısırgan otlar;" },
  { time: 102.0, text: "O sızı ve kışkırtma..." },
  { time: 105.2, text: "O yazı hatırlıyor musun?" },
  { time: 107.3, text: "Bankta oturduğumuz anı?" },
  { time: 110.0, text: "Cüret ettiğimiz o gerçekleri" },
  { time: 112.0, text: "Ve tenimizdeki o kırmızı parlamayı?" },
  { time: 118.4, text: "Yemin ederim seni hâlâ orada hissediyorum." },
  { time: 128.0, text: "♪" },
  { time: 145.9, text: "Örümcek, bir ipliğe asılmış örümcek," },
  { time: 153.0, text: "Başımın hemen yanından ipek bir halatla iniyor." },
  { time: 160.0, text: "Bir haftadır gördüğüm en yakın yaratık." },
  { time: 164.0, text: "Bakış açımı sürekli bulandıran sen misin yoksa?" },
  { time: 173.3, text: "♪" },
  { time: 187.9, text: "Göstermez misin bana nerede olduğunu?" },
  { time: 195.0, text: "Beni odanın bir ucundan diğerine dans ettir sevgilim." },
  { time: 206.4, text: "Gel benimle," },
  { time: 210.0, text: "Dokun yapraklara," },
  { time: 214.8, text: "O sızıyı ve o kışkırtmayı.." },
  { time: 217.1, text: "Ve sor bana neye ihtiyacım olduğunu." },
  { time: 230.0, text: "Eğer bilseydim," },
  { time: 233.0, text: "Bazen tek gördüğümün sen olduğunu" },
  { time: 236.0, text: "Ve kaybolduğumu." },
  { time: 237.4, text: "Kendimi aramak için bir ışık getirirdim" },
  { time: 246.1, text: "Benim için parlayacak" },
  { time: 249.0, text: "Benim için parlayacak.." },
  { time: 256.0, text: "Bana bir ışık tutacak..." },
  { time: 265.0, text: "♪" },
  { time: 291.9, text: "Yemin ederim seni hâlâ orada hissediyorum." },
  { time: 301.0, text: "Seni hâlâ orada hissediyorum." },
  { time: 323.0, text: "Yemin ederim seni hâlâ orada hissediyorum.." },
  { time: 330.0, text: "Seni hâlâ orada hissediyorum.." },
  { time: 349.2, text: "Göstermez misin bana nerede olduğunu?" },
  { time: 357.7, text: "Göstermez miydin bana nerede olduğunu?" },
  { time: 364.0, text: "Nerede olduğunu?" },
  { time: 373.0, text: "♪" }
];

    const audio = document.getElementById('audio');
    const lyricsContainer = document.getElementById('lyrics');
    const playButton = document.getElementById('playButton');
    const pauseButton = document.getElementById('pauseButton');

    let lyricInterval;

    function updateLyrics() {
      const currentTime = audio.currentTime;
      let activeText = "";

      for (let i = 0; i < lyrics.length; i++) {
        if (currentTime >= lyrics[i].time) {
          activeText = lyrics[i].text;
        } else {
          break;
        }
      }

      if (lyricsContainer.textContent !== activeText) {
        lyricsContainer.textContent = activeText;
        lyricsContainer.classList.remove('visible');
        void lyricsContainer.offsetWidth; 
        lyricsContainer.classList.add('visible');
      }
    }

    playButton.addEventListener('click', () => {
      audio.play();
      playButton.style.display = 'none';
      pauseButton.style.display = 'inline-block';
      lyricInterval = setInterval(updateLyrics, 50);
    });

    pauseButton.addEventListener('click', () => {
      audio.pause();
      pauseButton.style.display = 'none';
      playButton.style.display = 'inline-block';
      clearInterval(lyricInterval);
    });

    audio.addEventListener('ended', () => {
      playButton.style.display = 'inline-block';
      pauseButton.style.display = 'none';
      clearInterval(lyricInterval);
      lyricsContainer.textContent = "♪";
    });

    // Sayfa yüklendiğinde ilk liriği göster
    window.onload = () => {
        lyricsContainer.classList.add('visible');
    };
  </script>

</body>
</html>
